<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Assinatura</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
 body {
  margin: 0;
  background: #eeeeee;
  font-family: "Segoe UI", Arial, Helvetica, sans-serif;
}

  .container {
    display: flex;
    gap: 30px;
    padding: 20px;
  }

  .form {
    width: 260px;
  }

  .form input {
    width: 100%;
    margin-bottom: 8px;
    padding: 6px;
    font-size: 13px;
  }

  .form button {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    cursor: pointer;
  }

  #assinatura {
    width: 450px;
    height: 150px;
    position: relative;
    overflow: hidden;
  }

  #bg {
    position: absolute;
    width: 450px;
    height: 150px;
    top: 0;
    left: 0;
  }

  .nome {
    position: absolute;
    left: 18px;
    top: 16px;
    font-size: 16px;
    font-weight: bold;
    color: #2f4f46;
  }

  .cargo {
    position: absolute;
    left: 18px;
    top: 36px;
    font-size: 12px;
    color: #2f4f46;
  }

 .fone1 {
  position: absolute;
  left: 18px;
  top: 105px;
  font-size: 12px;
  font-weight: 500;
  color: #2f4f46;
}

.fone2 {
  position: absolute;
  left: 135px;
  top: 105px;
  font-size: 12px;
  font-weight: 500;
  color: #2f4f46;
}

.site {
  position: absolute;
  left: 18px;
  top: 115px;
  font-size: 12px;
  font-weight: 500;
  color: #2f4f46;
}
</style>

</head>

<body>

<div class="container">

  <div class="form">
    <input id="nomeInput" value="Nome completo">
    <input id="cargoInput" value="Departamento ou Gabinete">
    <input id="fone1Input" value="44 3518-5050">
    <input id="fone2Input" value="Ramal">
    <input id="siteInput" value="www.campomourao.pr.leg.br">

```
<button onclick="atualizar()">Atualizar</button>
<button onclick="baixar()">Baixar PNG</button>
```

  </div>

  <div id="assinatura">
    <img id="bg">
    <div id="nome" class="nome">Luciana dos Santos de Almeida</div>
    <div id="cargo" class="cargo">Departamento de Assuntos Administrativos</div>
    <div id="fone1" class="fone1">44 3518-5050</div>
    <div id="fone2" class="fone2">44 3518-5088</div>
    <div id="site" class="site">www.campomourao.pr.leg.br</div>
  </div>

</div>

<script>
// 🔥 CONVERTE IMAGEM LOCAL PARA BASE64 AUTOMATICAMENTE
fetch("base.png")
  .then(res => res.blob())
  .then(blob => {
    const reader = new FileReader();
    reader.onloadend = function () {
      document.getElementById("bg").src = reader.result;
    };
    reader.readAsDataURL(blob);
  });

function atualizar() {
  nome.innerText = nomeInput.value;
  cargo.innerText = cargoInput.value;
  fone1.innerText = fone1Input.value;
  fone2.innerText = fone2Input.value;
  site.innerText = siteInput.value;
}

function baixar() {
  const el = document.getElementById("assinatura");

  html2canvas(el, {
    scale: 3
  }).then(canvas => {

    const finalCanvas = document.createElement("canvas");
    finalCanvas.width = 450;
    finalCanvas.height = 150;

    const ctx = finalCanvas.getContext("2d");
    ctx.drawImage(canvas, 0, 0, 450, 150);

    const link = document.createElement("a");
    link.download = "assinatura.png";
    link.href = finalCanvas.toDataURL("image/png");
    link.click();
  });
}
</script>

</body>
</html>
