<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Assinatura</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
  body {
    margin: 0;
    background: #eeeeee;
    font-family: "Segoe UI", Arial, Helvetica, sans-serif;
  }

  .container {
    display: flex;
    gap: 30px;
    padding: 20px;
  }

  .form {
    width: 260px;
  }

  .form input {
    width: 100%;
    margin-bottom: 8px;
    padding: 6px;
    font-size: 13px;
  }

  .form button {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    cursor: pointer;
  }

  #assinatura {
    width: 450px;
    height: 150px;
    position: relative;
    overflow: hidden;
  }

  #bg {
    position: absolute;
    width: 450px;
    height: 150px;
    top: 0;
    left: 0;
  }

  .nome {
    position: absolute;
    left: 18px;
    top: 16px;
    font-size: 16px;
    font-weight: bold;
    color: #2f4f46;
    font-family: Arial, Helvetica, sans-serif;
  }

  .cargo {
    position: absolute;
    left: 18px;
    top: 36px;
    font-size: 12px;
    color: #2f4f46;
    font-weight: bold;
  }

  .fone1 {
    position: absolute;
    left: 18px;
    top: 105px;
    font-size: 12px;
    font-weight: 500;
    color: #2f4f46;
  }

  .fone2 {
    position: absolute;
    left: 100px;
    top: 105px;
    font-size: 12px;
    font-weight: 500;
    color: #2f4f46;
  }

  .site {
    position: absolute;
    left: 18px;
    top: 115px;
    font-size: 12px;
    font-weight: 500;
    color: #2f4f46;
  }
</style>

</head>

<body>

<div class="container">

  <div class="form">
    <input id="nomeInput" value="Nome Completo">
    <input id="cargoInput" value="Departamento ou Gabinete">
    <input id="fone1Input" value="44 3518-5050">
    <input id="fone2Input" value="Ramal ou celular">
    <input id="siteInput" value="www.campomourao.pr.leg.br">

```
<button onclick="atualizar()">Atualizar</button>
<button onclick="baixar()">Baixar PNG</button>
```

  </div>

  <div id="assinatura">
    <img id="bg" src="base.png">

```
<div id="nome" class="nome">Nome Completo</div>
<div id="cargo" class="cargo">Departamento</div>
<div id="fone1" class="fone1">44 3518-5050</div>
<div id="fone2" class="fone2">Ramal ou celular</div>
<div id="site" class="site">www.campomourao.pr.leg.br</div>
```

  </div>

</div>

<script>
function atualizar() {
  document.getElementById("nome").innerText = document.getElementById("nomeInput").value;
  document.getElementById("cargo").innerText = document.getElementById("cargoInput").value;
  document.getElementById("fone1").innerText = document.getElementById("fone1Input").value;
  document.getElementById("fone2").innerText = document.getElementById("fone2Input").value;
  document.getElementById("site").innerText = document.getElementById("siteInput").value;
}

function baixar() {
  const el = document.getElementById("assinatura");

  html2canvas(el, {
    scale: 4, // 🔥 aumenta qualidade
    useCORS: true
  }).then(canvas => {

    const finalCanvas = document.createElement("canvas");
    finalCanvas.width = 450;
    finalCanvas.height = 150;

    const ctx = finalCanvas.getContext("2d");

    // 🔥 melhora qualidade ao reduzir
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";

    ctx.drawImage(canvas, 0, 0, 450, 150);

    const link = document.createElement("a");
    link.download = "assinatura.png";
    link.href = finalCanvas.toDataURL("image/png");
    link.click();
  });
}
</script>

</body>
</html>
